services:
  db:
    image: postgres:15-alpine
    container_name: samruddhi_db
    environment:
      POSTGRES_USER: sanket
      POSTGRES_PASSWORD: sanket12
      POSTGRES_DB: samruddhi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanket -d samruddhi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samruddhi_backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://samruddhiorganics.shop
    container_name: samruddhi_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  backend_uploads: