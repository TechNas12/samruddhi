name: Deploy Samruddhi Organics

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy .env from original deployment
        run: cp /home/valorant/apps/samruddhi/backend/.env backend/.env

      - name: Backend - Install Dependencies
        working-directory: ./backend
        run: |
          python3 -m venv venv || true
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Backend - Restart
        working-directory: ./backend
        run: |
          pm2 delete samruddhi-api || true
          pm2 start "venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" --name samruddhi-api
          pm2 save

      - name: Frontend - Install and Build
        working-directory: ./frontend
        run: |
          npm install
          NEXT_PUBLIC_API_URL=https://api.samruddhiorganics.shop npm run build

      - name: Frontend - Restart
        working-directory: ./frontend
        run: |
          pm2 delete samruddhi-web || true
          pm2 start "npm run start" --name samruddhi-web
          pm2 save