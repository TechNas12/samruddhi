name: Deploy Samruddhi Organics

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # Save the .env file BEFORE checkout wipes the directory
      - name: Preserve .env file
        run: |
          if [ -f backend/.env ]; then
            cp backend/.env /tmp/samruddhi-backend.env
            echo "Saved existing .env to /tmp"
          elif [ -f /tmp/samruddhi-backend.env ]; then
            echo ".env already preserved in /tmp from a previous run"
          else
            echo "WARNING: No .env file found. You need to manually create it."
            echo "Run on server: nano $(pwd)/backend/.env"
            echo "Then re-run this workflow."
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      # Restore the .env file AFTER checkout
      - name: Restore .env file
        run: |
          cp /tmp/samruddhi-backend.env backend/.env
          echo ".env restored successfully"

      - name: Backend - Install Dependencies
        working-directory: ./backend
        run: |
          python3 -m venv venv || true
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Backend - Restart
        working-directory: ./backend
        run: |
          source venv/bin/activate
          pm2 delete samruddhi-api || true
          pm2 start "$(pwd)/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" --name "samruddhi-api" --cwd "$(pwd)"
          pm2 save

      - name: Frontend - Install and Build
        working-directory: ./frontend
        run: |
          npm install
          NEXT_PUBLIC_API_URL=https://api.samruddhiorganics.shop npm run build

      - name: Frontend - Restart
        working-directory: ./frontend
        run: |
          pm2 delete samruddhi-web || true
          pm2 start "npm run start" --name "samruddhi-web" --cwd "$(pwd)"
          pm2 save
