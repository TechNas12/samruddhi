name: Deploy Samruddhi Organics

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backend - Install Dependencies
        run: |
          cd /home/valorant/apps/samruddhi/backend
          python3 -m venv venv || true
          source venv/bin/activate
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Frontend - Install and Build
        run: |
          cd /home/valorant/apps/samruddhi/frontend
          npm install
          NEXT_PUBLIC_API_URL=https://api.samruddhiorganics.shop npm run build

      - name: Restart Services
        run: |
          pm2 restart /home/valorant/apps/samruddhi/ecosystem.config.js --update-env
          pm2 save
